name: Build for Hostinger

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Obter o código-fonte
      uses: actions/checkout@v4

    - name: ⚙️ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 📦 Instalar e Compilar (Build)
      run: |
        npm install
        npm run build

    - name: 🚀 Enviar pasta "dist" para a branch "production"
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        publish_branch: production
        force_orphan: true
